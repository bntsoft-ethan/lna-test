<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>LNA 스캐너 연결 테스트</title>
<style>
  body { font-family: 'Malgun Gothic', sans-serif; max-width: 760px; margin: 2rem auto; padding: 0 1rem; line-height: 1.6; }
  h1 { font-size: 1.3rem; }
  h3 { margin-bottom: .3rem; }
  .info { background: #f0f4f8; border-radius: 8px; padding: .8rem 1rem; font-size: .9rem; }
  button { font-size: .95rem; padding: .5rem .9rem; margin: .25rem .25rem .25rem 0; border-radius: 6px; border: 1px solid #888; background: #fff; cursor: pointer; }
  button:hover { background: #eef; }
  .primary { background: #2b6cb0; color: #fff; border-color: #2b6cb0; font-weight: bold; }
  .primary:hover { background: #245a94; }
  #log { margin-top: 1rem; }
  .entry { border-left: 4px solid #ccc; padding: .4rem .8rem; margin: .4rem 0; font-size: .9rem; white-space: pre-wrap; word-break: break-all; }
  .ok   { border-color: #2a9d2a; background: #eefaee; }
  .fail { border-color: #d43; background: #fdeeee; }
  .guide { display: none; background: #fff8e1; border: 1px solid #e0c060; border-radius: 8px; padding: .8rem 1rem; margin-top: 1rem; font-size: .9rem; }
  #json { background: #1e1e2e; color: #cdd6f4; border-radius: 8px; padding: .8rem; font-size: .78rem; white-space: pre-wrap; word-break: break-all; display: none; }
</style>
</head>
<body>
<h1>지문 스캐너 LNA(Local Network Access) 연결 테스트</h1>

<div class="info">
  <div>페이지 origin: <b id="origin"></b> (공개 주소 공간)</div>
  <div>브라우저: <b id="ua"></b></div>
  <div>LNA 권한 상태: <b id="perm">조회 중...</b></div>
</div>

<p><button class="primary" onclick="runAll()">▶ 전체 테스트 실행 (결과 JSON 생성)</button>
<button onclick="copyJson()">결과 JSON 복사</button></p>

<h3>개별: 기본 fetch (no-cors)</h3>
<button onclick="run('nc-localhost', 'https://localhost:60101/', {mode:'no-cors'})">localhost:60101</button>
<button onclick="run('nc-127', 'https://127.0.0.1:60101/', {mode:'no-cors'})">127.0.0.1:60101</button>

<h3>개별: targetAddressSpace 명시</h3>
<button onclick="run('tas-localhost', 'https://localhost:60101/', {mode:'no-cors', targetAddressSpace:'loopback'})">localhost:60101</button>
<button onclick="run('tas-127', 'https://127.0.0.1:60101/', {mode:'no-cors', targetAddressSpace:'loopback'})">127.0.0.1:60101</button>

<h3>개별: 실제 API 호출 (CORS, 응답 본문 수신)</h3>
<button onclick="run('api-version', 'https://localhost:60101/api/GetVersion', {method:'GET'}, true)">GET /api/GetVersion</button>
<button onclick="run('api-health', 'https://localhost:60101/api/v1/health', {method:'GET'}, true)">GET /api/v1/health</button>

<div id="guide" class="guide">
  <b>연결이 차단되었습니다.</b> 이전에 "차단"을 선택했다면:<br>
  ① 주소창 자물쇠(🔒) 클릭 → ② "사이트 권한" → ③ "로컬 네트워크 액세스" <b>허용</b> → ④ 새로고침
</div>

<pre id="json"></pre>
<div id="log"></div>

<script>
const results = { meta: {}, tests: {} };

document.getElementById('origin').textContent = location.origin;
const uaShort = navigator.userAgent.match(/Edg\/[\d.]+|Chrome\/[\d.]+/)?.[0] || navigator.userAgent;
document.getElementById('ua').textContent = uaShort;
results.meta.origin = location.origin;
results.meta.browser = uaShort;

async function queryPerm() {
  try {
    const r = await navigator.permissions.query({ name: 'local-network-access' });
    document.getElementById('perm').textContent = r.state;
    results.meta.lnaPermission = r.state;
    return r.state;
  } catch (e) {
    document.getElementById('perm').textContent = '조회 불가: ' + e.message;
    results.meta.lnaPermission = 'query-error: ' + e.message;
    return null;
  }
}
queryPerm();

function stamp() { return new Date().toLocaleTimeString('ko-KR', {hour12:false}); }

function addLog(cls, text) {
  const d = document.createElement('div');
  d.className = 'entry ' + cls;
  d.textContent = '[' + stamp() + '] ' + text;
  document.getElementById('log').prepend(d);
}

async function run(key, url, opts, readBody) {
  const t0 = performance.now();
  try {
    const r = await fetch(url, opts);
    const ms = Math.round(performance.now() - t0);
    let body = null;
    if (readBody && r.type !== 'opaque') {
      try { body = (await r.text()).slice(0, 300); } catch (e) { body = 'body-read-error: ' + e.message; }
    }
    const summary = 'OK type=' + r.type + (r.type !== 'opaque' ? ' status=' + r.status : '') + ' ' + ms + 'ms';
    results.tests[key] = { result: 'OK', type: r.type, status: r.type !== 'opaque' ? r.status : null, ms, body };
    addLog('ok', key + ' ✅ ' + summary + (body ? '\n' + body : ''));
    document.getElementById('guide').style.display = 'none';
    return true;
  } catch (e) {
    const ms = Math.round(performance.now() - t0);
    results.tests[key] = { result: 'FAIL', error: e.name + ': ' + e.message, ms };
    addLog('fail', key + ' ❌ ' + e.name + ' — ' + e.message + ' (' + ms + 'ms)');
    document.getElementById('guide').style.display = 'block';
    return false;
  }
}

async function runAll() {
  results.meta.startedAt = new Date().toISOString();
  results.meta.lnaPermissionBefore = await queryPerm();
  await run('nc-localhost', 'https://localhost:60101/', {mode:'no-cors'});
  await run('nc-127', 'https://127.0.0.1:60101/', {mode:'no-cors'});
  await run('tas-localhost', 'https://localhost:60101/', {mode:'no-cors', targetAddressSpace:'loopback'});
  await run('tas-127', 'https://127.0.0.1:60101/', {mode:'no-cors', targetAddressSpace:'loopback'});
  await run('api-version', 'https://localhost:60101/api/GetVersion', {method:'GET'}, true);
  await run('api-health', 'https://localhost:60101/api/v1/health', {method:'GET'}, true);
  results.meta.lnaPermissionAfter = await queryPerm();
  const el = document.getElementById('json');
  el.textContent = JSON.stringify(results, null, 2);
  el.style.display = 'block';
  window.__lnaResults = results;
}

function copyJson() {
  navigator.clipboard.writeText(JSON.stringify(results, null, 2)).then(() => addLog('ok', '결과 JSON 클립보드 복사됨'));
}
</script>
</body>
</html>
